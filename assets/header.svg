<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohit R. Nalbuga — Hardware Engineer HUD banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1622"/><stop offset="0.55" stop-color="#122a3a"/><stop offset="1" stop-color="#0b1a26"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a0703a"/><stop offset="1" stop-color="#e8b872"/>
    </linearGradient>
    <radialGradient id="vg" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffcf94"/><stop offset="1" stop-color="#ffcf94" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#8a6a3e" opacity="0.14"/></pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000" opacity="0.10"/></pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="softv" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- (3) BACKGROUND — washes in after traces + components -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.7s" fill="freeze"/>
    <rect width="1000" height="250" rx="9" fill="url(#bg)"/>
    <rect width="1000" height="250" rx="9" fill="url(#dots)"/>
    <rect x="6" y="6" width="988" height="238" rx="8" fill="none" stroke="#8a6a3e" stroke-opacity="0.4" stroke-width="1.3"/>
    <g stroke="#d9a45c" stroke-width="2.4" fill="none"><path d="M20 40 V20 H40"/><path d="M980 210 V230 H960"/></g>
  </g>

  <!-- (1) TRACES — draw first, routed only through empty zones -->
  <g fill="none" stroke="url(#trace)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M258 30 H548"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0s" dur="0.8s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M6 208 H128 L156 184 H300"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.12s" dur="0.8s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M300 184 L326 210 H372"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.24s" dur="0.7s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M600 170 H656 L682 196 H752"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.36s" dur="0.8s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M994 42 H872"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.28s" dur="0.7s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M994 204 H906 L884 182 H826"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.5s" dur="0.8s" fill="freeze"/></path>
  </g>

  <!-- (2) COMPONENTS — realistic footprints, fade in after traces -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.6s" fill="freeze"/>

    <!-- DIP/SOIC-8 IC: pins on BOTH sides + pin-1 notch & dot -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#14212c">
      <rect x="470" y="190" width="58" height="26" rx="2.5"/>
      <line x1="482" y1="190" x2="482" y2="183"/><line x1="494" y1="190" x2="494" y2="183"/><line x1="506" y1="190" x2="506" y2="183"/><line x1="518" y1="190" x2="518" y2="183"/>
      <line x1="482" y1="216" x2="482" y2="223"/><line x1="494" y1="216" x2="494" y2="223"/><line x1="506" y1="216" x2="506" y2="223"/><line x1="518" y1="216" x2="518" y2="223"/>
      <path d="M470 199 a5 5 0 0 0 0 8" fill="none"/>
    </g>
    <circle cx="479" cy="197" r="1.6" fill="#e8b872"/>

    <!-- SMD chip resistor: body + metallized end-caps + leads -->
    <g stroke="#b08a54" stroke-width="1.3">
      <line x1="410" y1="200" x2="422" y2="200"/><line x1="450" y1="200" x2="462" y2="200"/>
      <rect x="422" y="194" width="28" height="12" rx="1.5" fill="#1c140d"/>
      <rect x="422" y="194" width="5" height="12" fill="#cf9350" stroke="none"/><rect x="445" y="194" width="5" height="12" fill="#cf9350" stroke="none"/>
    </g>

    <!-- ceramic capacitor: two plates + leads (sits on the trace) -->
    <g stroke="#cf9350" stroke-width="1.6" stroke-linecap="round">
      <line x1="618" y1="196" x2="618" y2="208"/><line x1="626" y1="196" x2="626" y2="208"/>
      <line x1="622" y1="170" x2="622" y2="196"/><line x1="622" y1="208" x2="622" y2="220"/>
    </g>

    <!-- pin-header connector (right edge): body + pin holes + pins -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#14212c">
      <rect x="948" y="118" width="18" height="56" rx="2"/>
    </g>
    <g stroke="#cf9350" stroke-width="1.3" fill="none">
      <circle cx="957" cy="128" r="2.4"/><circle cx="957" cy="140" r="2.4"/><circle cx="957" cy="152" r="2.4"/><circle cx="957" cy="164" r="2.4"/>
      <line x1="948" y1="128" x2="940" y2="128"/><line x1="948" y1="140" x2="940" y2="140"/><line x1="948" y1="152" x2="940" y2="152"/><line x1="948" y1="164" x2="940" y2="164"/>
    </g>

    <!-- annular-ring vias (pad + drilled hole), scattered -->
    <g><circle cx="548" cy="30" r="4" fill="#cf9350"/><circle cx="548" cy="30" r="1.5" fill="#0b1a26"/></g>
    <g><circle cx="372" cy="210" r="4" fill="#cf9350"/><circle cx="372" cy="210" r="1.5" fill="#0b1a26"/></g>
    <g><circle cx="752" cy="196" r="4" fill="#cf9350"/><circle cx="752" cy="196" r="1.5" fill="#0b1a26"/></g>
    <g><circle cx="872" cy="42" r="4" fill="#cf9350"/><circle cx="872" cy="42" r="1.5" fill="#0b1a26"/></g>
    <g><circle cx="826" cy="182" r="3.4" fill="#cf9350"/><circle cx="826" cy="182" r="1.3" fill="#0b1a26"/></g>
  </g>

  <!-- (4) EFFECTS — pulses, glow, HUD readouts, scanlines -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.7s" fill="freeze"/>

    <path fill="none" stroke="#ffe0ad" stroke-width="2.4" stroke-linecap="round" filter="url(#softv)" pathLength="1" stroke-dasharray="0.05 0.95" d="M258 30 H548"><animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.6s" begin="2.6s" repeatCount="indefinite"/></path>
    <path fill="none" stroke="#ffe0ad" stroke-width="2.4" stroke-linecap="round" filter="url(#softv)" pathLength="1" stroke-dasharray="0.05 0.95" d="M994 204 H906 L884 182 H826"><animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.8s" begin="2.9s" repeatCount="indefinite"/></path>
    <circle cx="548" cy="30" r="9" fill="url(#vg)"><animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="2.7s" repeatCount="indefinite"/></circle>

    <g font-family="'Consolas',monospace">
      <circle cx="690" cy="66" r="4.5" fill="#5fd98a"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" begin="2.6s" repeatCount="indefinite"/></circle>
      <text x="702" y="70" font-size="12.5" fill="#c49a68" letter-spacing="2">SYSTEM ONLINE</text>
      <text x="722" y="112" font-size="11.5" fill="#c49a68" letter-spacing="1.5">SYNC</text>
      <rect x="762" y="103" width="150" height="10" rx="5" fill="#141f1a" stroke="#8a6a3e" stroke-width="1.1"/>
      <rect x="764" y="105.5" height="5" rx="2.5" fill="#e8b872" width="0"><animate attributeName="width" from="0" to="146" dur="1.2s" begin="2.6s" fill="freeze"/></rect>
      <text x="742" y="150" font-size="11.5" fill="#a8895c" letter-spacing="1.5">STATUS: BUILDING</text>
    </g>

    <rect width="1000" height="250" rx="9" fill="url(#scan)"/>
  </g>

  <!-- (5) NAME — appears last -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.8s" fill="freeze"/>
    <g font-family="'Consolas','SFMono-Regular',monospace">
      <rect x="56" y="50" width="66" height="22" rx="3" fill="#1c2620" stroke="#d9a45c" stroke-width="1.2"/>
      <text x="89" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c580" letter-spacing="1">LVL 04</text>
      <text x="132" y="66" font-size="12.5" fill="#c49a68" letter-spacing="2">HARDWARE ENGINEER</text>
    </g>
    <g text-anchor="start" font-family="'Consolas','SFMono-Regular',monospace">
      <text x="56" y="128" fill="#e8b06a" font-size="45" font-weight="700" letter-spacing="5" filter="url(#glow)" opacity="0.5">ROHIT R. NALBUGA</text>
      <text x="56" y="128" fill="#f7f0e2" font-size="45" font-weight="700" letter-spacing="5">ROHIT R. NALBUGA</text>
      <text x="58" y="158" fill="#d9b98a" font-size="13" font-weight="600" letter-spacing="7">P C B &#160;·&#160; E M B E D D E D &#160;·&#160; R F</text>
    </g>
  </g>
</svg>
