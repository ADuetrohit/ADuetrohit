<svg width="1000" height="240" viewBox="0 0 1000 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohit R. Nalbuga - PCB, Embedded and RF Designer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1826"/>
      <stop offset="0.5" stop-color="#12324c"/>
      <stop offset="1" stop-color="#0b2135"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6b8a"/>
      <stop offset="1" stop-color="#5fd3c4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ff0e0"/>
      <stop offset="1" stop-color="#7ff0e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#3f7fa0" opacity="0.14"/>
    </pattern>
    <style>
      .trace { stroke: url(#trace); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .draw  { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 2s ease forwards; }
      .pulse { stroke: #b7ffef; stroke-width: 2.4; stroke-linecap: round; filter: url(#soft);
               stroke-dasharray: 0.05 0.95; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <rect width="1000" height="240" fill="url(#bg)"/>
  <rect width="1000" height="240" fill="url(#dots)"/>
  <rect x="0" y="0" width="1000" height="240" fill="none" stroke="#2f6b8a" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- LEFT traces -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:.05s" d="M0 46 H70 Q80 46 86 53 L112 80 H240"/>
    <path class="draw" style="animation-delay:.25s" d="M0 120 H44 Q54 120 60 127 L84 152 H214"/>
    <path class="draw" style="animation-delay:.45s" d="M0 198 H150 Q160 198 166 191 L184 173 H252"/>
  </g>
  <!-- RIGHT traces -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:.15s" d="M1000 54 H930 Q920 54 914 61 L888 88 H760"/>
    <path class="draw" style="animation-delay:.35s" d="M1000 128 H956 Q946 128 940 135 L916 160 H786"/>
    <path class="draw" style="animation-delay:.55s" d="M1000 200 H858 Q848 200 842 193 L824 175 H748"/>
  </g>
  <!-- TOP + BOTTOM center rails -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:.7s" d="M320 20 H680"/>
    <path class="draw" style="animation-delay:.85s" d="M290 222 H710"/>
  </g>

  <!-- traveling signal pulses -->
  <g pathLength="1">
    <path class="pulse" pathLength="1" d="M0 46 H70 Q80 46 86 53 L112 80 H240">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.4s" begin="2s" repeatCount="indefinite"/>
    </path>
    <path class="pulse" pathLength="1" d="M1000 54 H930 Q920 54 914 61 L888 88 H760">
      <animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.8s" begin="2.3s" repeatCount="indefinite"/>
    </path>
    <path class="pulse" pathLength="1" d="M320 20 H680">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.1s" begin="2.6s" repeatCount="indefinite"/>
    </path>
    <path class="pulse" pathLength="1" d="M290 222 H710">
      <animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.6s" begin="2.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- vias / pads -->
  <g fill="#5fd3c4">
    <circle cx="240" cy="80" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="214" cy="152" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="252" cy="173" r="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="88" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="786" cy="160" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="748" cy="175" r="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="url(#glow)" opacity="0.9">
    <circle cx="240" cy="80" r="9"><animate attributeName="opacity" values="0;0.8;0" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="88" r="9"><animate attributeName="opacity" values="0;0.8;0" dur="2.4s" begin="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <g text-anchor="middle" font-family="'Consolas','SFMono-Regular','Menlo',monospace" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.9s" fill="freeze"/>
    <text x="500" y="118" fill="#eef7f5" font-size="46" font-weight="700" letter-spacing="7" filter="url(#soft)">ROHIT R. NALBUGA</text>
    <text x="500" y="150" fill="#79ddce" font-size="15" font-weight="600" letter-spacing="9">P C B &#160;·&#160; E M B E D D E D &#160;·&#160; R F</text>
  </g>

  <!-- accent underline draws in -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:1.4s" d="M430 168 H570"/>
  </g>
  <circle cx="430" cy="168" r="3" fill="#5fd3c4"/>
  <circle cx="570" cy="168" r="3" fill="#5fd3c4"/>
</svg>
