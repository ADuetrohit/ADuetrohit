<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohit R. Nalbuga — Hardware Engineer HUD banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08151f"/>
      <stop offset="0.5" stop-color="#10304a"/>
      <stop offset="1" stop-color="#0a1f31"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6b8a"/><stop offset="1" stop-color="#5fd3c4"/>
    </linearGradient>
    <radialGradient id="vg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ff0e0"/><stop offset="1" stop-color="#7ff0e0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#3f7fa0" opacity="0.13"/></pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" y="0" fill="#000000" opacity="0.10"/></pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/></feMerge></filter>
    <filter id="softv" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .trace{stroke:url(#trace);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
      .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.8s ease forwards;}
      .pulse{stroke:#b7ffef;stroke-width:2.4;stroke-linecap:round;filter:url(#softv);stroke-dasharray:0.05 0.95;}
      @keyframes draw{to{stroke-dashoffset:0;}}
    </style>
  </defs>

  <rect width="1000" height="250" rx="9" fill="url(#bg)"/>
  <rect width="1000" height="250" rx="9" fill="url(#dots)"/>

  <!-- HUD frame + corner brackets -->
  <rect x="6" y="6" width="988" height="238" rx="8" fill="none" stroke="#2f6b8a" stroke-opacity="0.45" stroke-width="1.4"/>
  <g stroke="#5fd3c4" stroke-width="2.4" fill="none">
    <path d="M20 42 V20 H42"/><path d="M958 20 H980 V42"/><path d="M980 208 V230 H958"/><path d="M42 230 H20 V208"/>
  </g>

  <!-- side traces -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:.1s" d="M6 92 H80 L108 118 H182"/>
    <path class="draw" style="animation-delay:.3s" d="M6 176 H60 L88 150 H172"/>
    <path class="draw" style="animation-delay:.2s" d="M994 92 H920 L892 118 H818"/>
    <path class="draw" style="animation-delay:.4s" d="M994 176 H940 L912 150 H828"/>
  </g>
  <g pathLength="1">
    <path class="pulse" pathLength="1" d="M6 92 H80 L108 118 H182"><animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.4s" begin="1.8s" repeatCount="indefinite"/></path>
    <path class="pulse" pathLength="1" d="M994 92 H920 L892 118 H818"><animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.6s" begin="2.1s" repeatCount="indefinite"/></path>
  </g>
  <g fill="#5fd3c4">
    <circle cx="182" cy="118" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="818" cy="118" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="1.7s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="url(#vg)">
    <circle cx="182" cy="118" r="9"><animate attributeName="opacity" values="0;0.7;0" dur="2.4s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="818" cy="118" r="9"><animate attributeName="opacity" values="0;0.7;0" dur="2.6s" begin="1.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- IC chips -->
  <g stroke="#5fd3c4" stroke-width="1.4" fill="#0e2a3f">
    <rect x="34" y="198" width="46" height="24" rx="3"/>
    <line x1="43" y1="222" x2="43" y2="228"/><line x1="53" y1="222" x2="53" y2="228"/><line x1="63" y1="222" x2="63" y2="228"/><line x1="73" y1="222" x2="73" y2="228"/>
    <rect x="920" y="198" width="46" height="24" rx="3"/>
    <line x1="929" y1="222" x2="929" y2="228"/><line x1="939" y1="222" x2="939" y2="228"/><line x1="949" y1="222" x2="949" y2="228"/><line x1="959" y1="222" x2="959" y2="228"/>
  </g>

  <!-- top-left HUD: level + class -->
  <g font-family="'Consolas','SFMono-Regular',monospace">
    <rect x="26" y="18" width="70" height="22" rx="3" fill="#123047" stroke="#5fd3c4" stroke-width="1.2"/>
    <text x="61" y="33" text-anchor="middle" font-size="13" font-weight="700" fill="#7ff0e0" letter-spacing="1">LVL 04</text>
    <text x="106" y="34" font-size="12.5" fill="#6fd8c8" letter-spacing="2">HARDWARE ENGINEER</text>
  </g>
  <!-- top-right HUD: status -->
  <g font-family="'Consolas',monospace">
    <text x="952" y="34" text-anchor="end" font-size="12.5" fill="#6fd8c8" letter-spacing="2">SYSTEM ONLINE</text>
    <circle cx="968" cy="30" r="4.5" fill="#48e08a"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title: glow copy + crisp copy -->
  <g text-anchor="middle" font-family="'Consolas','SFMono-Regular',monospace" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.7s" fill="freeze"/>
    <text x="500" y="132" fill="#57e6c7" font-size="47" font-weight="700" letter-spacing="7" filter="url(#glow)" opacity="0.55">ROHIT R. NALBUGA</text>
    <text x="500" y="132" fill="#f2fbfa" font-size="47" font-weight="700" letter-spacing="7">ROHIT R. NALBUGA</text>
    <text x="500" y="162" fill="#79ddce" font-size="14" font-weight="600" letter-spacing="9">P C B &#160;·&#160; E M B E D D E D &#160;·&#160; R F</text>
  </g>

  <!-- bottom boot bar -->
  <g font-family="'Consolas',monospace">
    <text x="296" y="222" text-anchor="end" font-size="11.5" fill="#6fd8c8" letter-spacing="1.5">BOOT</text>
    <rect x="308" y="212" width="336" height="12" rx="6" fill="#0e2438" stroke="#2f6b8a" stroke-width="1.1"/>
    <rect x="311" y="215" height="6" rx="3" fill="#5fd3c4" width="0">
      <animate attributeName="width" from="0" to="330" dur="2.1s" begin="0.6s" fill="freeze"/>
    </rect>
    <g stroke="#0a1f31" stroke-width="1.4">
      <line x1="375" y1="212" x2="375" y2="224"/><line x1="442" y1="212" x2="442" y2="224"/><line x1="509" y1="212" x2="509" y2="224"/><line x1="576" y1="212" x2="576" y2="224"/>
    </g>
    <text x="656" y="222" font-size="11.5" font-weight="700" fill="#48e08a" letter-spacing="1.5" opacity="0">READY<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.7s" fill="freeze"/></text>
  </g>

  <!-- CRT scanlines overlay -->
  <rect width="1000" height="250" rx="9" fill="url(#scan)"/>
</svg>
