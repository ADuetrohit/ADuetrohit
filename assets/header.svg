<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohit R. Nalbuga — Hardware Engineer HUD banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08151f"/><stop offset="0.55" stop-color="#10304a"/><stop offset="1" stop-color="#0a1f31"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6b8a"/><stop offset="1" stop-color="#5fd3c4"/>
    </linearGradient>
    <radialGradient id="vg" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7ff0e0"/><stop offset="1" stop-color="#7ff0e0" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#3f7fa0" opacity="0.13"/></pattern>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#000" opacity="0.10"/></pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="softv" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .trace{stroke:url(#trace);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
      .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.9s ease forwards;}
      .pulse{stroke:#b7ffef;stroke-width:2.4;stroke-linecap:round;filter:url(#softv);stroke-dasharray:0.05 0.95;}
      @keyframes draw{to{stroke-dashoffset:0;}}
    </style>
  </defs>

  <rect width="1000" height="250" rx="9" fill="url(#bg)"/>
  <rect width="1000" height="250" rx="9" fill="url(#dots)"/>
  <rect x="6" y="6" width="988" height="238" rx="8" fill="none" stroke="#2f6b8a" stroke-opacity="0.4" stroke-width="1.3"/>

  <!-- asymmetric corner brackets: only top-left + bottom-right -->
  <g stroke="#5fd3c4" stroke-width="2.4" fill="none">
    <path d="M20 40 V20 H40"/><path d="M980 210 V230 H960"/>
  </g>

  <!-- ORGANIC (non-mirrored) traces -->
  <g class="trace" pathLength="1">
    <path class="draw" style="animation-delay:.05s" d="M6 214 H112 L150 178 H322 L358 142 H505"/>
    <path class="draw" style="animation-delay:.35s" d="M232 26 H602"/>
    <path class="draw" style="animation-delay:.2s"  d="M994 44 H902 L870 68 H800"/>
    <path class="draw" style="animation-delay:.5s"  d="M994 196 H930 L906 174 H842"/>
    <path class="draw" style="animation-delay:.65s" d="M322 178 V206 H366"/>
  </g>
  <g pathLength="1">
    <path class="pulse" pathLength="1" d="M6 214 H112 L150 178 H322 L358 142 H505"><animate attributeName="stroke-dashoffset" from="1" to="0" dur="3s" begin="1.9s" repeatCount="indefinite"/></path>
    <path class="pulse" pathLength="1" d="M994 44 H902 L870 68 H800"><animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.5s" begin="2.2s" repeatCount="indefinite"/></path>
  </g>

  <!-- scattered vias -->
  <g fill="#5fd3c4">
    <circle cx="505" cy="142" r="3.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="68" r="3.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="602" cy="26" r="3"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="322" cy="178" r="2.6"/>
  </g>
  <circle cx="800" cy="68" r="9" fill="url(#vg)"><animate attributeName="opacity" values="0;0.7;0" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>

  <!-- scattered components (non-mirrored) -->
  <!-- IC chip lower-left, on a trace -->
  <g stroke="#5fd3c4" stroke-width="1.4" fill="#0e2a3f">
    <rect x="340" y="200" width="52" height="26" rx="3"/>
    <line x1="350" y1="226" x2="350" y2="232"/><line x1="362" y1="226" x2="362" y2="232"/><line x1="374" y1="226" x2="374" y2="232"/><line x1="384" y1="226" x2="384" y2="232"/>
  </g>
  <circle cx="347" cy="207" r="1.6" fill="#5fd3c4"/>
  <!-- edge connector far right -->
  <g stroke="#5fd3c4" stroke-width="1.4" fill="#0e2a3f">
    <rect x="956" y="150" width="16" height="52" rx="2"/>
    <line x1="956" y1="160" x2="946" y2="160"/><line x1="956" y1="172" x2="946" y2="172"/><line x1="956" y1="184" x2="946" y2="184"/><line x1="956" y1="196" x2="946" y2="196"/>
  </g>
  <!-- resistor + capacitor motifs -->
  <g stroke="#3f9ab0" stroke-width="1.3" fill="none">
    <rect x="452" y="196" width="24" height="9" rx="1.5"/><line x1="446" y1="200.5" x2="452" y2="200.5"/><line x1="476" y1="200.5" x2="482" y2="200.5"/>
    <line x1="676" y1="196" x2="676" y2="210"/><line x1="684" y1="196" x2="684" y2="210"/><line x1="680" y1="188" x2="680" y2="196"/><line x1="680" y1="210" x2="680" y2="218"/>
  </g>

  <!-- LEFT: player nameplate -->
  <g font-family="'Consolas','SFMono-Regular',monospace">
    <rect x="56" y="50" width="66" height="22" rx="3" fill="#123047" stroke="#5fd3c4" stroke-width="1.2"/>
    <text x="89" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#7ff0e0" letter-spacing="1">LVL 04</text>
    <text x="132" y="66" font-size="12.5" fill="#6fd8c8" letter-spacing="2">HARDWARE ENGINEER</text>
  </g>
  <g text-anchor="start" font-family="'Consolas','SFMono-Regular',monospace" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.7s" fill="freeze"/>
    <text x="56" y="128" fill="#57e6c7" font-size="45" font-weight="700" letter-spacing="5" filter="url(#glow)" opacity="0.5">ROHIT R. NALBUGA</text>
    <text x="56" y="128" fill="#f2fbfa" font-size="45" font-weight="700" letter-spacing="5">ROHIT R. NALBUGA</text>
    <text x="58" y="158" fill="#79ddce" font-size="13" font-weight="600" letter-spacing="7">P C B &#160;·&#160; E M B E D D E D &#160;·&#160; R F</text>
  </g>

  <!-- RIGHT: staggered HUD readouts (asymmetric) -->
  <g font-family="'Consolas',monospace">
    <circle cx="690" cy="66" r="4.5" fill="#48e08a"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/></circle>
    <text x="702" y="70" font-size="12.5" fill="#6fd8c8" letter-spacing="2">SYSTEM ONLINE</text>

    <text x="722" y="112" font-size="11.5" fill="#6fd8c8" letter-spacing="1.5">SYNC</text>
    <rect x="762" y="103" width="150" height="10" rx="5" fill="#0e2438" stroke="#2f6b8a" stroke-width="1.1"/>
    <rect x="764" y="105.5" height="5" rx="2.5" fill="#5fd3c4" width="0"><animate attributeName="width" from="0" to="146" dur="2s" begin="0.6s" fill="freeze"/></rect>
    <text x="922" y="112" font-size="11" fill="#48e08a" letter-spacing="1" opacity="0">OK<animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.6s" fill="freeze"/></text>

    <text x="742" y="150" font-size="11.5" fill="#5aa9c0" letter-spacing="1.5">STATUS: BUILDING</text>
  </g>

  <rect width="1000" height="250" rx="9" fill="url(#scan)"/>
</svg>
