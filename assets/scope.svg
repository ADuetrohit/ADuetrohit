<svg width="1000" height="250" viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Live ECG oscilloscope — 6-in-1 EXG biopotential sensor">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08161f"/>
      <stop offset="1" stop-color="#04252b"/>
    </linearGradient>
    <pattern id="graticule" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1f6b6b" stroke-width="0.6" opacity="0.32"/>
    </pattern>
    <filter id="tglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="crt"><rect x="10" y="10" width="980" height="230" rx="7"/></clipPath>
    <!-- one ECG beat, 250px wide, baseline y=140 -->
    <path id="beat" d="M0 140 L46 140 L58 128 L70 140 L96 140 L103 150 L113 60 L125 164 L133 140 L166 140 L188 118 L214 140 L250 140"/>
  </defs>

  <rect width="1000" height="250" rx="9" fill="url(#screen)"/>
  <rect x="10" y="10" width="980" height="230" rx="7" fill="url(#graticule)"/>
  <line x1="10" y1="140" x2="990" y2="140" stroke="#3fb0a0" stroke-width="1" opacity="0.35"/>
  <line x1="500" y1="10" x2="500" y2="240" stroke="#3fb0a0" stroke-width="1" opacity="0.2"/>

  <!-- scrolling ECG trace -->
  <g clip-path="url(#crt)">
    <g fill="none" stroke="#57e6c7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#tglow)">
      <use href="#beat" x="0"/><use href="#beat" x="250"/><use href="#beat" x="500"/><use href="#beat" x="750"/>
      <use href="#beat" x="1000"/><use href="#beat" x="1250"/><use href="#beat" x="1500"/><use href="#beat" x="1750"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1000 0" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- leading beam dot fixed at right edge -->
  <line x1="930" y1="14" x2="930" y2="236" stroke="#57e6c7" stroke-width="1" opacity="0.25"/>

  <!-- screen frame + corner brackets -->
  <rect x="10" y="10" width="980" height="230" rx="7" fill="none" stroke="#2f6b8a" stroke-opacity="0.5" stroke-width="1.4"/>
  <g stroke="#57e6c7" stroke-width="2" fill="none" opacity="0.8">
    <path d="M22 40 V22 H40"/><path d="M960 22 H978 V40"/><path d="M978 210 V228 H960"/><path d="M40 228 H22 V210"/>
  </g>

  <!-- labels -->
  <g font-family="'Consolas','SFMono-Regular',monospace" fill="#6fd8c8">
    <text x="30" y="36" font-size="15" font-weight="700" letter-spacing="1.5">HARDWARE · SIGNAL BENCH</text>
    <text x="970" y="36" font-size="13" text-anchor="end" letter-spacing="1" opacity="0.85">CH1 · 1&#8202;mV/div · 200&#8202;ms/div</text>
    <text x="970" y="228" font-size="12" text-anchor="end" letter-spacing="1" opacity="0.6">PCB · FIRMWARE · RF · BIOMEDICAL · ROBOTICS</text>
  </g>
  <g font-family="'Consolas',monospace">
    <circle cx="34" cy="222" r="5" fill="#ff5d6c"><animate attributeName="opacity" values="1;0.15;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <text x="46" y="227" font-size="13" fill="#ff8a94" font-weight="700" letter-spacing="1.5">LIVE</text>
  </g>
</svg>
