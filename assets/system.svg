<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Living board system map — MCU with power, USB, RF and analog blocks">
  <defs>
    <linearGradient id="sub" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1622"/><stop offset="0.55" stop-color="#0f2634"/><stop offset="1" stop-color="#0a1824"/>
    </linearGradient>
    <linearGradient id="cu" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a0703a"/><stop offset="1" stop-color="#e8b872"/>
    </linearGradient>
    <radialGradient id="hb" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffcf94" stop-opacity="0.55"/><stop offset="1" stop-color="#ffcf94" stop-opacity="0"/></radialGradient>
    <pattern id="mask" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#8a6a3e" opacity="0.12"/></pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- substrate -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.4s" fill="freeze"/>
    <rect width="1000" height="260" rx="10" fill="url(#sub)"/>
    <rect width="1000" height="260" rx="10" fill="url(#mask)"/>
    <rect x="6" y="6" width="988" height="248" rx="9" fill="none" stroke="#8a6a3e" stroke-opacity="0.35" stroke-width="1.2"/>
  </g>

  <!-- traces draw in -->
  <g fill="none" stroke="url(#cu)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M176 133 H372 L392 145 H412"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.3s" dur="0.9s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M212 60 V78 H432 L444 82"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.45s" dur="0.9s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M222 60 V70 H416 L428 82"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.55s" dur="0.9s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M804 62 V78 H504 L492 82"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.6s" dur="1s" fill="freeze"/></path>
    <path pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" d="M748 178 H532 L516 160"><animate attributeName="stroke-dashoffset" from="1" to="0" begin="0.75s" dur="0.9s" fill="freeze"/></path>
  </g>

  <!-- components: MCU + blocks -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.6s" fill="freeze"/>
    <!-- MCU (QFP, pins on 4 sides) -->
    <g stroke="#cf9350" stroke-width="1.5" fill="#16242f">
      <rect x="412" y="82" width="96" height="96" rx="4"/>
      <line x1="412" y1="96" x2="404" y2="96"/><line x1="412" y1="112" x2="404" y2="112"/><line x1="412" y1="128" x2="404" y2="128"/><line x1="412" y1="144" x2="404" y2="144"/><line x1="412" y1="160" x2="404" y2="160"/>
      <line x1="508" y1="96" x2="516" y2="96"/><line x1="508" y1="112" x2="516" y2="112"/><line x1="508" y1="128" x2="516" y2="128"/><line x1="508" y1="144" x2="516" y2="144"/><line x1="508" y1="160" x2="516" y2="160"/>
      <line x1="428" y1="82" x2="428" y2="74"/><line x1="444" y1="82" x2="444" y2="74"/><line x1="460" y1="82" x2="460" y2="74"/><line x1="476" y1="82" x2="476" y2="74"/><line x1="492" y1="82" x2="492" y2="74"/>
      <line x1="428" y1="178" x2="428" y2="186"/><line x1="444" y1="178" x2="444" y2="186"/><line x1="460" y1="178" x2="460" y2="186"/><line x1="476" y1="178" x2="476" y2="186"/><line x1="492" y1="178" x2="492" y2="186"/>
    </g>
    <circle cx="424" cy="94" r="2.6" fill="#e8b872"/>

    <!-- POWER block + battery motif -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#101e2a"><rect x="60" y="108" width="116" height="50" rx="6"/></g>
    <g stroke="#e8b872" stroke-width="2" stroke-linecap="round"><line x1="92" y1="136" x2="92" y2="152"/><line x1="102" y1="140" x2="102" y2="148"/></g>
    <line x1="84" y1="144" x2="92" y2="144" stroke="#e8b872" stroke-width="1.4"/><line x1="102" y1="144" x2="110" y2="144" stroke="#e8b872" stroke-width="1.4"/>

    <!-- USB block -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#101e2a"><rect x="150" y="26" width="136" height="34" rx="5"/></g>

    <!-- RF block + meander antenna -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#101e2a"><rect x="724" y="24" width="160" height="38" rx="5"/></g>
    <path d="M884 40 h12 v-9 h-12 v-9 h12 v-9 h-12" fill="none" stroke="#e8b872" stroke-width="1.6" stroke-linejoin="round"/>

    <!-- AFE block -->
    <g stroke="#cf9350" stroke-width="1.4" fill="#101e2a"><rect x="748" y="156" width="160" height="50" rx="6"/></g>

    <!-- pads / vias -->
    <g><circle cx="372" cy="133" r="4" fill="#e8b872"/><circle cx="372" cy="133" r="1.5" fill="#0a1622"/></g>
    <g><circle cx="504" cy="78" r="4" fill="#e8b872"/><circle cx="504" cy="78" r="1.5" fill="#0a1622"/></g>
    <g><circle cx="532" cy="178" r="4" fill="#e8b872"/><circle cx="532" cy="178" r="1.5" fill="#0a1622"/></g>
    <g><circle cx="176" cy="133" r="3.4" fill="#e8b872"/><circle cx="176" cy="133" r="1.3" fill="#0a1622"/></g>
  </g>

  <!-- labels -->
  <g opacity="0" font-family="'Consolas','SFMono-Regular',monospace"><animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.6s" fill="freeze"/>
    <text x="460" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#f0c580" letter-spacing="2">MCU</text>
    <text x="460" y="144" text-anchor="middle" font-size="8.5" fill="#c49a68" letter-spacing="2">EMBEDDED CORE</text>
    <text x="118" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#d9b98a" letter-spacing="2">POWER</text>
    <text x="218" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#d9b98a" letter-spacing="1.5">USB · 90&#8202;Ω</text>
    <text x="804" y="47" text-anchor="middle" font-size="12" font-weight="700" fill="#d9b98a" letter-spacing="1.5">RF · ANTENNA</text>
    <text x="828" y="179" text-anchor="middle" font-size="12" font-weight="700" fill="#d9b98a" letter-spacing="1.5">ANALOG AFE</text>
    <text x="828" y="194" text-anchor="middle" font-size="8.5" fill="#a8895c" letter-spacing="1.5">BIOPOTENTIAL · POWER-TREE</text>
    <text x="500" y="240" text-anchor="middle" font-size="11" fill="#a8895c" letter-spacing="3">POWER · SIGNAL INTEGRITY · RF · ANALOG · FIRMWARE</text>
  </g>

  <!-- effects: heartbeat + flowing signal pulses -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/>
    <circle cx="460" cy="130" r="40" fill="url(#hb)"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="1.4s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="130" r="66" fill="none" stroke="#e8b872" stroke-width="1.4" opacity="0">
      <animate attributeName="r" values="50;92" dur="2.2s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.2s" begin="2.5s" repeatCount="indefinite"/>
    </circle>

    <g fill="none" stroke="#ffe6bd" stroke-width="2.4" stroke-linecap="round" filter="url(#soft)">
      <path pathLength="1" stroke-dasharray="0.06 0.94" d="M176 133 H372 L392 145 H412"><animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.4s" begin="2.4s" repeatCount="indefinite"/></path>
      <path pathLength="1" stroke-dasharray="0.06 0.94" d="M804 62 V78 H504 L492 82"><animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.8s" begin="2.7s" repeatCount="indefinite"/></path>
      <path pathLength="1" stroke-dasharray="0.06 0.94" d="M748 178 H532 L516 160"><animate attributeName="stroke-dashoffset" from="0" to="1" dur="2.5s" begin="3s" repeatCount="indefinite"/></path>
      <path pathLength="1" stroke-dasharray="0.06 0.94" d="M212 60 V78 H432 L444 82"><animate attributeName="stroke-dashoffset" from="1" to="0" dur="2.2s" begin="3.2s" repeatCount="indefinite"/></path>
    </g>

    <!-- power-good LED -->
    <circle cx="150" cy="133" r="3.2" fill="#5fd98a"><animate attributeName="opacity" values="1;0.25;1" dur="1.6s" begin="2.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
